<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#eef4ed" />
  <title>Ingresar - Memora+</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="assets/logo-memora-plus.png" />
  <link rel="stylesheet" href="style.css?v=53" />
</head>
<body class="login-page">
  <a class="auth-guest auth-guest-floating" id="auth-guest" href="index.html">
    <span>Comenzar sin cuenta</span>
    <small>No necesitas correo ni contraseña</small>
  </a>
  <main class="auth-shell">
    <section class="auth-card" aria-label="Acceso Memora+">
      <img class="auth-logo" src="assets/logo-memora-plus.png" alt="Memora+" />
      <p class="auth-intro">Puedes comenzar de inmediato. Crear una cuenta es opcional y permite guardar el progreso en otros dispositivos.</p>

      <section id="auth-session-panel" class="auth-session-panel" hidden>
        <div class="auth-session-avatar" id="auth-session-avatar">M+</div>
        <div>
          <h1 id="auth-session-name">Usuario</h1>
          <p id="auth-session-email">correo</p>
        </div>
        <a class="auth-submit-link" href="index.html">Entrar a Memora+</a>
        <button class="auth-muted-button" id="auth-logout" type="button">Cerrar sesión</button>
      </section>

      <form id="auth-form" class="auth-form">
        <div class="auth-tabs" role="tablist" aria-label="Tipo de acceso">
          <button class="auth-tab active" id="auth-login-tab" type="button">Ingresar</button>
          <button class="auth-tab" id="auth-register-tab" type="button">Crear cuenta</button>
        </div>

        <label id="auth-name-row" hidden>
          Nombre
          <input id="auth-name" type="text" autocomplete="name" placeholder="Ej: Teresa" />
        </label>
        <label>
          Correo
          <input id="auth-email" type="email" autocomplete="email" placeholder="tu@email.com" required />
        </label>
        <label>
          Contraseña
          <input id="auth-password" type="password" autocomplete="current-password" placeholder="Tu contraseña" required />
        </label>

        <button class="auth-submit" id="auth-submit" type="submit">Ingresar</button>
        <div class="auth-status" id="auth-status" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script type="module" src="main.js?v=52"></script>
</body>
</html>
