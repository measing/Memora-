<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#eef4ed" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Memora+" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Memora+</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="assets/logo-memora-plus.png" />
  <link rel="stylesheet" href="style.css?v=16" />
</head>
<body>
  <div class="top-account" id="account-bar" aria-label="Cuenta"></div>
  <main class="memora-page">
    <section class="memora-plus-view" id="memora-view" aria-label="Memora+">
      <div class="memora-plus-app" id="memora-plus-app">
        <section class="memora-guide" id="memora-guide" aria-live="polite"></section>

        <section class="memora-plus-layout memora-guided-layout" id="memora-app-layout" hidden>
          <section class="memora-activity-panel" aria-live="polite">
            <div class="memora-activity-top">
              <div>
                <span id="memora-level-tag">Nivel 1</span>
                <h2 id="memora-level-title">Memoria visual simple</h2>
              </div>
              <div class="memora-access-controls" aria-label="Ajustes de accesibilidad">
                <label>
                  Velocidad
                  <select id="memora-speed">
                    <option value="slow">Pausada</option>
                    <option value="normal" selected>Normal</option>
                    <option value="fast">Rápida</option>
                  </select>
                </label>
                <label class="memora-toggle">
                  <input id="memora-large-mode" type="checkbox" checked />
                  <span>Cartas grandes</span>
                </label>
              </div>
            </div>

            <div class="memora-session-strip">
              <div><span>Aciertos</span><strong id="memora-hits">0</strong></div>
              <div><span>Errores</span><strong id="memora-misses">0</strong></div>
              <div><span>Progreso</span><strong id="memora-progress">0/0</strong></div>
            </div>

            <p class="memora-prompt" id="memora-prompt"></p>
            <div class="memora-temporal-question" id="memora-temporal-question" hidden></div>
            <div id="memora-board" class="memora-board"></div>
            <div id="memora-sequence-controls" class="memora-sequence-controls" hidden></div>

            <div class="memora-action-row">
              <button class="memora-primary-button" id="memora-start" type="button" hidden>Iniciar ejercicio</button>
              <button class="memora-secondary-button" id="memora-repeat" type="button">Repetir muestra</button>
            </div>
          </section>

        </section>
      </div>
    </section>
  </main>

  <script type="module" src="main.js?v=19"></script>
</body>
</html>
