<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#eef4ed" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Memora+" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Memora+</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="assets/logo-memora-plus.png" />
  <link rel="stylesheet" href="style.css?v=51" />
</head>
<body>
  <div class="top-lobby" id="lobby-bar" hidden>
    <button class="lobby-pill" id="memora-back-lobby" type="button">Regresar al inicio</button>
  </div>
  <div class="top-account" id="account-bar" aria-label="Cuenta"></div>
  <div class="memora-history-modal" id="memora-history-modal" role="dialog" aria-modal="true" aria-labelledby="memora-history-title" hidden>
    <div class="memora-history-panel">
      <div class="memora-history-header">
        <div>
          <span>Seguimiento personal</span>
          <h2 id="memora-history-title">Historial</h2>
        </div>
        <button class="memora-history-close" id="memora-history-close" type="button" aria-label="Cerrar historial">x</button>
      </div>
      <div id="memora-history-content"></div>
    </div>
  </div>
  <main class="memora-page">
    <section class="memora-plus-view" id="memora-view" aria-label="Memora+">
      <div class="memora-plus-app" id="memora-plus-app">
        <section class="memora-guide" id="memora-guide" aria-live="polite"></section>

        <section class="memora-plus-layout memora-guided-layout" id="memora-app-layout" hidden>
          <section class="memora-activity-panel" aria-live="polite">
            <div class="memora-activity-top">
              <div>
                <span id="memora-level-tag">Actividad 1</span>
                <h2 id="memora-level-title">Encuentra las parejas</h2>
              </div>
              <div class="memora-access-controls" aria-label="Ajustes de accesibilidad">
                <label>
                  Tiempo para observar
                  <select id="memora-observe-time">
                    <option value="7000">7 segundos</option>
                    <option value="10000" selected>10 segundos</option>
                    <option value="15000">15 segundos</option>
                  </select>
                </label>
                <label>Animaciones<select id="memora-animation-speed"><option value="normal">Normal</option><option value="reduced">Reducida</option></select></label>
                <label>Tamaño de pantalla<select id="memora-interface-size"><option value="normal">Normal</option><option value="large" selected>Grande</option><option value="xlarge">Muy grande</option></select></label>
                <label>Dificultad<select id="memora-difficulty"><option value="gentle">Suave</option><option value="normal" selected>Normal</option><option value="challenge">Desafío</option></select></label>
                <label class="memora-toggle"><input id="memora-ready-mode" type="checkbox" /><span>Continuar cuando esté listo</span></label>
                <label class="memora-toggle"><input id="memora-voice-mode" type="checkbox" /><span>Mensajes hablados</span></label>
                <label class="memora-toggle"><input id="memora-companion-mode" type="checkbox" /><span>Modo acompañante</span></label>
              </div>
            </div>

            <p class="memora-prompt" id="memora-prompt"></p>
            <div class="memora-temporal-question" id="memora-temporal-question" hidden></div>

            <div class="memora-play-area" id="memora-play-area">
              <div class="memora-play-main">
                <div id="memora-board" class="memora-board"></div>
                <div id="memora-sequence-controls" class="memora-sequence-controls" hidden></div>
                <div class="memora-pair-guide" id="memora-pair-guide" aria-label="Pares a encontrar" hidden></div>
              </div>
              <aside class="memora-side-panel" aria-label="Seguimiento del ejercicio">
                <div class="memora-session-strip">
                  <div><span>Logros</span><strong id="memora-hits">0</strong></div>
                  <div><span>Intentos adicionales</span><strong id="memora-misses">0</strong></div>
                  <div><span>Avance</span><strong id="memora-progress">0/0</strong></div>
                </div>
              </aside>
            </div>

            <div class="memora-action-row">
              <button class="memora-secondary-button" id="memora-listen" type="button">🔊 Escuchar instrucciones</button>
              <button class="memora-secondary-button" id="memora-help" type="button">Necesito ayuda</button>
              <button class="memora-secondary-button" id="memora-practice" type="button">Practicar primero</button>
              <button class="memora-secondary-button" id="memora-pause" type="button">Pausar</button>
              <button class="memora-primary-button" id="memora-ready" type="button" hidden>Ya estoy listo</button>
              <button class="memora-primary-button" id="memora-start" type="button" hidden>Iniciar ejercicio</button>
              <button class="memora-secondary-button" id="memora-repeat" type="button">Repetir muestra</button>
              <button class="memora-next-button" id="memora-next-level" type="button" hidden>Siguiente nivel</button>
            </div>
          </section>

        </section>
      </div>
    </section>
  </main>

  <script type="module" src="main.js?v=50"></script>
</body>
</html>
